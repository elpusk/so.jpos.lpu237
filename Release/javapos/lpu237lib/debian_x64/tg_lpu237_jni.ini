[common]
name = "tg_lpu237_jni"
version = "3.0"
description = "lpu237 JNI functionality dynamic library"
date = "06232026"

[log]
enable = 1
;Delete logs older than "days" days at startup
days = 3

; subcomponent_path 의 key,value pair 은 자유롭게 추가 가능.
; key,value pair 은 tg_lpu237_example.dll(libtg_lpu237_example.so) 가 사용하는 dll(so) 로
; 만약 tvl.dll(libtvl.so)를 사용하면, tvl=c:\sub 또는 tvl=/use/var 와 같이 key는 tvl, value는 dll(so) 이름으로 추가
; value 는 절대경로로 끝에 / 나 \ 를 붙이지 않는 형태로 작성하는 것을 권장.
;
; tg_lpu237_dll key 의 경우
; win x64 의 default value : C:\Program Files\elpusk\00000006\coffee_manager\dll\x64
; win x86 의 default value : C:\Program Files (x86)\elpusk\00000006\coffee_manager\dll\x86
; linux x64 의 default value : /usr/share/elpusk/program/00000006/coffee_manager/so
[subcomponent_path]
tg_lpu237_dll = /usr/share/elpusk/program/00000006/coffee_manager/so
